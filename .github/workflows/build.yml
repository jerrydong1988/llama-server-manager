name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: npm ci
      - name: Validate release
        run: npm run check:release
      - name: Build frontend
        run: npm run build
      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate --registry=https://registry.npmjs.org
      - name: Audit Rust dependencies
        # Tauri 2 still depends on the upstream GTK3 stack on Linux, while
        # tauri-utils 2.9 uses urlpattern 0.3. Keep these exact advisories
        # visible here until their upstream migrations land; new advisories
        # remain unignored and therefore produce a new release-blocking signal.
        uses: RustSec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
          ignore: RUSTSEC-2024-0370,RUSTSEC-2024-0411,RUSTSEC-2024-0412,RUSTSEC-2024-0413,RUSTSEC-2024-0414,RUSTSEC-2024-0415,RUSTSEC-2024-0416,RUSTSEC-2024-0417,RUSTSEC-2024-0418,RUSTSEC-2024-0419,RUSTSEC-2024-0420,RUSTSEC-2024-0429,RUSTSEC-2025-0075,RUSTSEC-2025-0080,RUSTSEC-2025-0081,RUSTSEC-2025-0098,RUSTSEC-2025-0100
      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings

  build-windows:
    needs: quality
    runs-on: windows-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: npm ci
      - name: Build frontend for Tauri context
        run: npm run build
      - name: Test Rust on Windows
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Lint Rust on Windows
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - name: Validate user guide
        run: npm run check:guide
      - name: Detect SignPath configuration
        id: signpath
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          $required = 'SIGNPATH_API_TOKEN','SIGNPATH_ORGANIZATION_ID','SIGNPATH_PROJECT_SLUG','SIGNPATH_SIGNING_POLICY_SLUG','SIGNPATH_ARTIFACT_CONFIGURATION_SLUG'
          $missing = $required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) }
          if ($missing) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            $message = "SignPath is not configured; publishing unsigned Windows installers. Missing: $($missing -join ', ')"
            Write-Output $message
            "### Windows signing`n`n$message" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          } else {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "### Windows signing`n`nSignPath is configured; installers will be submitted for signing." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload unsigned Windows installers for signing
        id: upload-unsigned-windows
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer-unsigned
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
      - name: Submit Windows installers to SignPath
        if: startsWith(github.ref, 'refs/tags/v') && steps.signpath.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-windows.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signed-windows
      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/
      - name: Upload signed Windows installers to Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.signpath.outputs.enabled == 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: |
            ${{ runner.temp }}/signed-windows/**/*.exe
            ${{ runner.temp }}/signed-windows/**/*.msi
      - name: Prepare clearly labeled unsigned Windows release assets
        if: startsWith(github.ref, 'refs/tags/v') && steps.signpath.outputs.enabled != 'true'
        shell: pwsh
        run: |
          $destination = Join-Path $env:RUNNER_TEMP 'unsigned-windows'
          New-Item -ItemType Directory -Path $destination -Force | Out-Null
          $installers = Get-ChildItem -Path 'src-tauri/target/release/bundle/nsis/*.exe','src-tauri/target/release/bundle/msi/*.msi'
          foreach ($installer in $installers) {
            $base = [IO.Path]::GetFileNameWithoutExtension($installer.Name)
            $extension = $installer.Extension
            Copy-Item -LiteralPath $installer.FullName -Destination (Join-Path $destination "$base-unsigned$extension")
          }
      - name: Upload unsigned Windows installers to Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.signpath.outputs.enabled != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: |
            ${{ runner.temp }}/unsigned-windows/*.exe
            ${{ runner.temp }}/unsigned-windows/*.msi

  build-macos:
    needs: quality
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: npm ci
      - name: Build frontend for Tauri context
        run: npm run build
      - name: Test Rust on macOS
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Lint Rust on macOS
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - name: Validate user guide
        run: npm run check:guide
      - name: Detect Apple signing configuration
        id: apple-signing
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=""
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "$(printenv "$name")" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            message="Apple signing credentials are incomplete; building an ad-hoc signed macOS package. Missing:$missing"
            echo "$message"
            printf '### macOS signing\n\n%s\n' "$message" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            printf '### macOS signing\n\nDeveloper ID signing and notarization are enabled.\n' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Import Apple signing certificate
        if: startsWith(github.ref, 'refs/tags/v') && steps.apple-signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          certificate_path="$RUNNER_TEMP/llama-server-manager.p12"
          keychain_path="$RUNNER_TEMP/llama-server-manager.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" | grep -F "$APPLE_SIGNING_IDENTITY"
      - name: Build ad-hoc signed Tauri package
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || steps.apple-signing.outputs.enabled != 'true' }}
        run: npm run tauri build
      - name: Build signed and notarized Tauri release
        if: startsWith(github.ref, 'refs/tags/v') && steps.apple-signing.outputs.enabled == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-app
          path: src-tauri/target/release/bundle/
      - name: Upload notarized macOS package to Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.apple-signing.outputs.enabled == 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
      - name: Prepare clearly labeled ad-hoc macOS release asset
        if: startsWith(github.ref, 'refs/tags/v') && steps.apple-signing.outputs.enabled != 'true'
        run: |
          destination="$RUNNER_TEMP/macos-release"
          mkdir -p "$destination"
          for file in src-tauri/target/release/bundle/dmg/*.dmg; do
            base="$(basename "$file" .dmg)"
            cp "$file" "$destination/$base-adhoc.dmg"
          done
      - name: Upload ad-hoc macOS package to Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.apple-signing.outputs.enabled != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: ${{ runner.temp }}/macos-release/*-adhoc.dmg
      - name: Remove temporary Apple signing keychain
        if: always() && startsWith(github.ref, 'refs/tags/v') && steps.apple-signing.outputs.enabled == 'true'
        run: |
          security delete-keychain "$RUNNER_TEMP/llama-server-manager.keychain-db" || true
          rm -f "$RUNNER_TEMP/llama-server-manager.p12"

  build-linux:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf || \
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf || \
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install dependencies
        run: npm ci
      - name: Build frontend for Tauri context
        run: npm run build
      - name: Test Rust on Linux x64
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Lint Rust on Linux x64
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - name: Validate user guide
        run: npm run check:guide
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: src-tauri/target/release/bundle/
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  build-linux-arm64:
    needs: quality
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install dependencies
        run: npm ci
      - name: Build frontend for Tauri context
        run: npm run build
      - name: Test Rust on Linux ARM64
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Lint Rust on Linux ARM64
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - name: Validate user guide
        run: npm run check:guide
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64-packages
          path: src-tauri/target/release/bundle/
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
